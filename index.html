<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>sound collector</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

:root {
  --bg:    #000;
  --white: #fff;
  --dgray: #2a2a2a;
  --mgray: #888;
  --red:   #ff3333;
  --green: #33ff88;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Courier New', Courier, monospace;
  height: 100dvh;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

/* ── screens ── */
.sc { display: none; flex-direction: column; height: 100dvh; }
.sc.on { display: flex; }

/* ── common ── */
.bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--dgray);
  font-size: 13px;
  color: var(--mgray);
}
.bar.top-red   { color: var(--red);   border-color: #400; }
.bar.top-green { color: var(--green); border-color: #040; }

.mid {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

/* ── MAIN ── */
.big { font-size: clamp(80px, 28vw, 140px); font-weight: bold; line-height: 1; }
.sm  { font-size: 14px; color: var(--mgray); }
.hint { font-size: 13px; color: var(--mgray); opacity: .5; margin-top: 20px; }

.main-footer {
  flex-shrink: 0;
  display: flex;
  border-top: 1px solid var(--dgray);
}
.mfbtn {
  flex: 1;
  padding: 20px;
  background: none;
  border: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--mgray);
  cursor: pointer;
  text-align: center;
}
.mfbtn.red { color: var(--red); }
.mfbtn:not(:last-child) { border-right: 1px solid var(--dgray); }
.mfbtn:active { background: #111; }

/* ── RECORDING ── */
.big-time { font-size: clamp(64px, 22vw, 100px); font-variant-numeric: tabular-nums; }
.prog-track {
  width: 68%;
  height: 5px;
  background: var(--dgray);
  border-radius: 3px;
  overflow: hidden;
}
.prog-fill { height: 100%; background: var(--red); width: 0; }

/* ── buttons ── */
.ibtn {
  margin-top: 40px;
  padding: 15px 40px;
  background: none;
  font-family: inherit;
  font-size: 15px;
  border-radius: 6px;
  cursor: pointer;
}
.ibtn.red   { border: 1px solid var(--red);   color: var(--red);   }
.ibtn.green { border: 1px solid var(--green);  color: var(--green); }
.ibtn.red:active   { background: #1a0000; }
.ibtn.green:active { background: #001a00; }

/* ── LIST ── */
.list-wrap { flex: 1; display: flex; position: relative; overflow: hidden; }
.list-mid {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding-right: 48px;
}
.list-num   { font-size: clamp(52px, 16vw, 80px); }
.list-info  { font-size: 13px; color: var(--mgray); }
.list-lbl   { font-size: 13px; color: var(--green); height: 18px; }

.nav-bar {
  flex-shrink: 0;
  display: flex;
  border-top: 1px solid var(--dgray);
}
.nbtn {
  flex: 1;
  padding: 18px 0;
  background: none;
  border: none;
  font-family: inherit;
  font-size: 13px;
  color: var(--mgray);
  cursor: pointer;
  text-align: center;
}
.nbtn:not(:last-child) { border-right: 1px solid var(--dgray); }
.nbtn:active { background: #111; }
.nbtn.on { color: var(--green); }

/* ── volume slider (right strip) ── */
.vol-strip {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 12px 0;
  border-left: 1px solid var(--dgray);
  touch-action: none;
}
.vol-track {
  flex: 1;
  width: 4px;
  background: var(--dgray);
  border-radius: 2px;
  position: relative;
  margin-bottom: 8px;
}
.vol-fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--mgray);
  border-radius: 2px;
}
.vol-thumb {
  position: absolute;
  left: 50%;
  transform: translate(-50%, 50%);
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--mgray);
  bottom: 0;
}
.vol-strip.active .vol-fill,
.vol-strip.active .vol-thumb { background: var(--white); }
.vol-num { font-size: 11px; color: var(--mgray); }
</style>
</head>
<body>

<!-- ── MAIN ── -->
<div class="sc on" id="s-main">
  <div class="bar">
    <span>sound collector</span>
    <span id="clock">--:--</span>
  </div>
  <div class="mid" id="main-tap">
    <div class="big" id="main-cnt">00</div>
    <div class="sm">sounds</div>
    <div class="hint">tap to browse</div>
  </div>
  <div class="main-footer">
    <button class="mfbtn red" id="rec-btn">⏺ REC</button>
    <button class="mfbtn"     id="all-btn">▶ PLAY all</button>
  </div>
</div>

<!-- ── RECORDING ── -->
<div class="sc" id="s-rec">
  <div class="bar top-red">
    <span>● recording</span><span></span>
  </div>
  <div class="mid">
    <div class="big-time" id="rec-time">10.0</div>
    <div class="prog-track"><div class="prog-fill" id="rec-fill"></div></div>
    <button class="ibtn red" id="stop-rec">stop</button>
  </div>
</div>

<!-- ── PLAYING ALL ── -->
<div class="sc" id="s-all">
  <div class="bar top-green">
    <span>▶ playing all</span><span></span>
  </div>
  <div class="mid">
    <div style="font-size:clamp(18px,5vw,26px)">all sounds</div>
    <div style="font-size:clamp(18px,5vw,26px);color:var(--mgray)">layered...</div>
    <button class="ibtn green" id="stop-all">stop</button>
  </div>
</div>

<!-- ── LIST ── -->
<div class="sc" id="s-list">
  <div class="bar">
    <span id="list-back" style="cursor:pointer">← back</span>
    <span>sound list</span>
    <span style="width:50px"></span>
  </div>
  <div class="list-wrap">
    <div class="list-mid">
      <div class="list-num" id="list-num">#--</div>
      <div class="list-info" id="list-info">– / –</div>
      <div class="list-lbl"  id="list-lbl"></div>
    </div>
    <div class="vol-strip" id="vol-strip">
      <div class="vol-track" id="vol-track">
        <div class="vol-fill"  id="vol-fill"></div>
        <div class="vol-thumb" id="vol-thumb"></div>
      </div>
      <div class="vol-num" id="vol-num">20</div>
    </div>
  </div>
  <div class="nav-bar">
    <button class="nbtn" id="prev-btn">← PREV</button>
    <button class="nbtn" id="play-btn">PLAY</button>
    <button class="nbtn" id="next-btn">NEXT →</button>
  </div>
</div>

<script>
// ── state ──────────────────────────────────────────────
let soundCount = 0, selectedIdx = 1, listPlaying = false, volume = 20;
let db, audioCtx, gainNode, currentSrcs = [], mediaRec, recChunks, recRaf;

// ── IndexedDB ──────────────────────────────────────────
async function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('sound-collector', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('sounds', { keyPath: 'id', autoIncrement: true });
    r.onsuccess = e => res(e.target.result);
    r.onerror = rej;
  });
}
const tx = (mode = 'readonly') => db.transaction('sounds', mode).objectStore('sounds');
const dbCount  = () => new Promise(r => { const q = tx().count(); q.onsuccess = () => r(q.result); });
const dbGetAll = () => new Promise(r => { const q = tx().getAll();  q.onsuccess = () => r(q.result); });
const dbGetOne = idx => new Promise(r => { const q = tx().getAll(); q.onsuccess = () => r(q.result[idx - 1] || null); });

async function dbSave(blob) {
  const cnt = await dbCount();
  const t = db.transaction('sounds', 'readwrite');
  const s = t.objectStore('sounds');
  if (cnt >= 50) await new Promise(r => { const c = s.openCursor(); c.onsuccess = e => { e.target.result?.delete(); r(); }; });
  s.add({ blob, ts: Date.now() });
  return new Promise(r => t.oncomplete = r);
}

// ── audio ──────────────────────────────────────────────
function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = volume / 30;
    gainNode.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function stopAudio() {
  currentSrcs.forEach(s => { try { s.stop(0); } catch (e) {} });
  currentSrcs = [];
}

async function playBuffer(blob) {
  const ac = getCtx();
  const buf = await ac.decodeAudioData(await blob.arrayBuffer());
  const src = ac.createBufferSource();
  src.buffer = buf;
  src.connect(gainNode);
  src.start(0);
  return src;
}

async function playOne(idx) {
  stopAudio();
  const item = await dbGetOne(idx);
  if (!item) return;
  gainNode.gain.value = volume / 30;
  const src = await playBuffer(item.blob);
  src.onended = () => { if (listPlaying) { listPlaying = false; updateListUI(); } };
  currentSrcs = [src];
}

async function playAll() {
  stopAudio();
  const all = await dbGetAll();
  gainNode.gain.value = volume / 30;
  const srcs = [];
  for (const item of all) { try { srcs.push(await playBuffer(item.blob)); } catch (e) {} }
  currentSrcs = srcs;
}

// ── screens ────────────────────────────────────────────
const show = id => { document.querySelectorAll('.sc').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); };

function updateMainCnt() { document.getElementById('main-cnt').textContent = String(soundCount).padStart(2, '0'); }

function updateListUI() {
  document.getElementById('list-num').textContent  = soundCount ? '#' + String(selectedIdx).padStart(2, '0') : '#--';
  document.getElementById('list-info').textContent = soundCount ? `${selectedIdx} / ${soundCount}` : '– / –';
  const pb = document.getElementById('play-btn');
  document.getElementById('list-lbl').textContent = listPlaying ? 'playing...' : '';
  pb.textContent = listPlaying ? 'STOP' : 'PLAY';
  pb.classList.toggle('on', listPlaying);
}

// ── navigation ─────────────────────────────────────────
function goMain()  { stopAudio(); listPlaying = false; updateMainCnt(); show('s-main'); }
function goList()  { if (selectedIdx > soundCount) selectedIdx = Math.max(1, soundCount); updateListUI(); updateVolUI(); show('s-list'); }
function goPrev()  { if (!soundCount) return; if (selectedIdx > 1) selectedIdx--; if (listPlaying) playOne(selectedIdx); updateListUI(); }
function goNext()  { if (!soundCount) return; if (selectedIdx < soundCount) selectedIdx++; if (listPlaying) playOne(selectedIdx); updateListUI(); }

async function togglePlay() {
  if (!soundCount) return;
  listPlaying = !listPlaying;
  if (listPlaying) await playOne(selectedIdx); else stopAudio();
  updateListUI();
}

// ── recording ──────────────────────────────────────────
async function startRec() {
  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch (e) { alert('마이크 권한을 허용해주세요'); return; }

  const types = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg'];
  const mime  = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
  mediaRec = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
  recChunks = [];

  mediaRec.ondataavailable = e => { if (e.data?.size > 0) recChunks.push(e.data); };
  mediaRec.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    await dbSave(new Blob(recChunks, { type: mediaRec.mimeType }));
    soundCount = await dbCount();
    if (selectedIdx > soundCount) selectedIdx = soundCount || 1;
    goMain();
  };

  mediaRec.start();
  const start = Date.now();
  show('s-rec');

  (function tick() {
    const elapsed = (Date.now() - start) / 1000;
    const left = Math.max(0, 10 - elapsed);
    document.getElementById('rec-time').textContent = left.toFixed(1);
    document.getElementById('rec-fill').style.width  = Math.min(elapsed / 10 * 100, 100) + '%';
    if (left <= 0) { stopRec(); return; }
    recRaf = requestAnimationFrame(tick);
  })();
}

function stopRec() {
  cancelAnimationFrame(recRaf);
  if (mediaRec?.state !== 'inactive') mediaRec.stop();
}

// ── play all ───────────────────────────────────────────
async function startAll() {
  if (!soundCount) return;
  show('s-all');
  await playAll();
}

// ── volume slider ──────────────────────────────────────
function updateVolUI() {
  const track = document.getElementById('vol-track');
  const h = track.getBoundingClientRect().height;
  const fillH = (volume / 30) * h;
  document.getElementById('vol-fill').style.height  = fillH + 'px';
  document.getElementById('vol-thumb').style.bottom = fillH + 'px';
  document.getElementById('vol-num').textContent    = volume;
}

function volFromY(clientY) {
  const rect = document.getElementById('vol-track').getBoundingClientRect();
  const pct  = 1 - Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
  volume = Math.round(pct * 30);
  if (gainNode) gainNode.gain.setTargetAtTime(volume / 30, getCtx().currentTime, 0.02);
  updateVolUI();
}

// ── clock ──────────────────────────────────────────────
function tick() {
  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// ── events ─────────────────────────────────────────────
function setup() {
  document.getElementById('main-tap').addEventListener('click', goList);
  document.getElementById('rec-btn').addEventListener('click', e => { e.stopPropagation(); startRec(); });
  document.getElementById('all-btn').addEventListener('click', e => { e.stopPropagation(); startAll(); });
  document.getElementById('stop-rec').addEventListener('click', stopRec);
  document.getElementById('stop-all').addEventListener('click', () => { stopAudio(); goMain(); });
  document.getElementById('list-back').addEventListener('click', goMain);
  document.getElementById('prev-btn').addEventListener('click', goPrev);
  document.getElementById('play-btn').addEventListener('click', togglePlay);
  document.getElementById('next-btn').addEventListener('click', goNext);

  // vol slider touch
  const strip = document.getElementById('vol-strip');
  let dragging = false;
  const activate   = () => strip.classList.add('active');
  const deactivate = () => strip.classList.remove('active');

  strip.addEventListener('touchstart', e => { e.preventDefault(); activate(); volFromY(e.touches[0].clientY); }, { passive: false });
  strip.addEventListener('touchmove',  e => { e.preventDefault(); volFromY(e.touches[0].clientY); }, { passive: false });
  strip.addEventListener('touchend',   () => deactivate());
  strip.addEventListener('mousedown',  e => { dragging = true; activate(); volFromY(e.clientY); });
  document.addEventListener('mousemove', e => { if (dragging) volFromY(e.clientY); });
  document.addEventListener('mouseup',   () => { if (dragging) { dragging = false; deactivate(); } });
}

// ── init ───────────────────────────────────────────────
(async () => {
  db = await openDB();
  soundCount = await dbCount();
  updateMainCnt();
  tick();
  setInterval(tick, 30000);
  setup();
})();
</script>
</body>
</html>
