<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>sound collector</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

:root {
  --bg:    #000;
  --white: #fff;
  --dgray: #2a2a2a;
  --mgray: #888;
  --red:   #ff3333;
  --green: #33ff88;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Courier New', Courier, monospace;
  height: 100dvh;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

/* ── screens ── */
.sc { display: none; flex-direction: column; height: 100dvh; }
.sc.on { display: flex; }

/* ── common ── */
.bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--dgray);
  font-size: 13px;
  color: var(--mgray);
}
.bar.top-red   { color: var(--red);   border-color: #400; }
.bar.top-green { color: var(--green); border-color: #040; }

.mid {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

/* ── MAIN ── */
.big { font-size: clamp(80px, 28vw, 140px); font-weight: bold; line-height: 1; }
.sm  { font-size: 14px; color: var(--mgray); }
.hint { font-size: 13px; color: var(--mgray); opacity: .5; margin-top: 20px; }

.main-footer {
  flex-shrink: 0;
  display: flex;
  border-top: 1px solid var(--dgray);
}
.mfbtn {
  flex: 1;
  padding: 20px;
  background: none;
  border: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--mgray);
  cursor: pointer;
  text-align: center;
}
.mfbtn.red { color: var(--red); }
.mfbtn:not(:last-child) { border-right: 1px solid var(--dgray); }
.mfbtn:active { background: #111; }

/* ── RECORDING ── */
.big-time { font-size: clamp(64px, 22vw, 100px); font-variant-numeric: tabular-nums; }
.prog-track {
  width: 68%;
  height: 5px;
  background: var(--dgray);
  border-radius: 3px;
  overflow: hidden;
}
.prog-fill { height: 100%; background: var(--red); width: 0; }

/* ── buttons ── */
.ibtn {
  margin-top: 40px;
  padding: 15px 40px;
  background: none;
  font-family: inherit;
  font-size: 15px;
  border-radius: 6px;
  cursor: pointer;
}
.ibtn.red   { border: 1px solid var(--red);   color: var(--red);   }
.ibtn.green { border: 1px solid var(--green);  color: var(--green); }
.ibtn.red:active   { background: #1a0000; }
.ibtn.green:active { background: #001a00; }

/* ── LIST ── */
.list-wrap { flex: 1; display: flex; position: relative; overflow: hidden; }
.list-mid {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding-right: 48px;
}
.list-num   { font-size: clamp(52px, 16vw, 80px); }
.list-info  { font-size: 13px; color: var(--mgray); }
.list-lbl   { font-size: 13px; color: var(--green); height: 18px; }

.nav-bar {
  flex-shrink: 0;
  display: flex;
  border-top: 1px solid var(--dgray);
}
.nbtn {
  flex: 1;
  padding: 18px 0;
  background: none;
  border: none;
  font-family: inherit;
  font-size: 13px;
  color: var(--mgray);
  cursor: pointer;
  text-align: center;
}
.nbtn:not(:last-child) { border-right: 1px solid var(--dgray); }
.nbtn:active { background: #111; }
.nbtn.on  { color: var(--green); }
.nbtn.red { color: var(--red);   }

/* ── volume slider (right strip) ── */
.vol-strip {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 12px 0;
  border-left: 1px solid var(--dgray);
  touch-action: none;
}
.vol-track {
  flex: 1;
  width: 4px;
  background: var(--dgray);
  border-radius: 2px;
  position: relative;
  margin-bottom: 8px;
}
.vol-fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--mgray);
  border-radius: 2px;
}
.vol-thumb {
  position: absolute;
  left: 50%;
  transform: translate(-50%, 50%);
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--mgray);
  bottom: 0;
}
.vol-strip.active .vol-fill,
.vol-strip.active .vol-thumb { background: var(--white); }
.vol-num { font-size: 11px; color: var(--mgray); }
</style>
</head>
<body>

<!-- ── MAIN ── -->
<div class="sc on" id="s-main">
  <div class="bar">
    <span>sound collector</span>
    <span id="clock">--:--</span>
  </div>
  <div class="mid" id="main-tap">
    <div class="big" id="main-cnt">00</div>
    <div class="sm">sounds</div>
    <div class="hint">tap to browse</div>
  </div>
  <div class="main-footer">
    <button class="mfbtn red" id="rec-btn">⏺ REC</button>
    <button class="mfbtn"     id="all-btn">▶ PLAY all</button>
  </div>
</div>

<!-- ── RECORDING ── -->
<div class="sc" id="s-rec">
  <div class="bar top-red">
    <span>● recording</span><span></span>
  </div>
  <div class="mid">
    <div class="big-time" id="rec-time">10.0</div>
    <div class="prog-track"><div class="prog-fill" id="rec-fill"></div></div>
    <canvas id="vis" width="220" height="48" style="margin-top:12px;border-radius:4px;background:#000;"></canvas>
    <button class="ibtn red" id="stop-rec">stop</button>
  </div>
</div>

<!-- ── PLAYING ALL ── -->
<div class="sc" id="s-all">
  <div class="bar top-green">
    <span>▶ playing all</span><span>↻ looping</span>
  </div>
  <div class="mid">
    <div style="font-size:clamp(18px,5vw,26px)">all sounds</div>
    <div style="font-size:clamp(18px,5vw,26px);color:var(--mgray)">layered...</div>
    <button class="ibtn green" id="stop-all">← back</button>
  </div>
</div>

<!-- ── LIST ── -->
<div class="sc" id="s-list">
  <div class="bar">
    <span id="list-back" style="cursor:pointer">← back</span>
    <span>sound list</span>
    <span style="width:50px"></span>
  </div>
  <div class="list-wrap">
    <div class="list-mid">
      <div class="list-num" id="list-num">#--</div>
      <div class="list-info" id="list-info">– / –</div>
      <div class="list-lbl"  id="list-lbl"></div>
    </div>
    <div class="vol-strip" id="vol-strip">
      <div class="vol-track" id="vol-track">
        <div class="vol-fill"  id="vol-fill"></div>
        <div class="vol-thumb" id="vol-thumb"></div>
      </div>
      <div class="vol-num" id="vol-num">20</div>
    </div>
  </div>
  <div class="nav-bar">
    <button class="nbtn" id="prev-btn">← PREV</button>
    <button class="nbtn" id="play-btn">PLAY</button>
    <button class="nbtn red" id="del-btn">DEL</button>
    <button class="nbtn" id="next-btn">NEXT →</button>
  </div>
</div>

<!-- 오류 토스트 -->
<div id="toast" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;
z-index:999;max-width:85%;text-align:center;pointer-events:none;"></div>

<script>
'use strict';
// ── state ──────────────────────────────────────────────
let sounds = [], soundCount = 0, selectedIdx = 1, listPlaying = false, volume = 20;
let db = null, activeAudios = [], mediaRec = null, recChunks = [], recRaf = null;
let visAC = null, visRaf = null, playAllLooping = false;

// ── 토스트 알림 ────────────────────────────────────────
function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ── IndexedDB ──────────────────────────────────────────
function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('sc-v2', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('sounds', { keyPath: 'id', autoIncrement: true });
    req.onsuccess = e => res(e.target.result);
    req.onerror   = () => rej(req.error);
  });
}
function dbLoadAll() {
  return new Promise((res, rej) => {
    const req = db.transaction('sounds').objectStore('sounds').getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
function dbSave(blob) {
  return new Promise((res, rej) => {
    const t = db.transaction('sounds', 'readwrite');
    const s = t.objectStore('sounds');
    t.oncomplete = res;
    t.onerror    = () => rej(t.error);
    if (sounds.length >= 50) {
      const cr = s.openCursor();
      cr.onsuccess = e => { if (e.target.result) e.target.result.delete(); s.add({ blob, ts: Date.now() }); };
    } else {
      s.add({ blob, ts: Date.now() });
    }
  });
}
async function reloadSounds() {
  sounds     = await dbLoadAll();
  soundCount = sounds.length;
}
function dbDelete(id) {
  return new Promise((res, rej) => {
    const t = db.transaction('sounds', 'readwrite');
    t.oncomplete = res; t.onerror = () => rej(t.error);
    t.objectStore('sounds').delete(id);
  });
}
async function deleteSelected() {
  if (!soundCount) return;
  const item = sounds[selectedIdx - 1];
  if (!item) return;
  stopAudio(); listPlaying = false;
  try {
    await dbDelete(item.id);
    await reloadSounds();
    toast(`sound #${String(selectedIdx).padStart(2,'0')} 삭제됨`);
    if (soundCount === 0) { goMain(); return; }
    if (selectedIdx > soundCount) selectedIdx = soundCount;
    refreshList();
  } catch(e) { toast('삭제 오류: ' + e.message); }
}

// ── 오디오 재생 — <audio> 엘리먼트 (Web Audio API 없음) ─
function stopAudio() {
  activeAudios.forEach(a => { try { a.pause(); a.src = ''; } catch(e){} try { URL.revokeObjectURL(a._url); } catch(e){} });
  activeAudios = [];
}

// Promise: resolves when play STARTS (not ends)
function playBlobEl(blob, onEnded) {
  if (!blob || blob.size === 0) { toast('소리 데이터 없음'); return Promise.resolve(); }
  const url = URL.createObjectURL(blob);
  const el  = document.createElement('audio');
  el.setAttribute('playsinline', '');
  el.setAttribute('webkit-playsinline', '');
  el._url   = url;
  el.src    = url;
  el.volume = Math.max(0, Math.min(1, volume / 30));
  el.onended = () => {
    try { URL.revokeObjectURL(url); } catch(e){}
    activeAudios = activeAudios.filter(a => a !== el);
    if (onEnded) onEnded();
  };
  el.onerror = () => {
    try { URL.revokeObjectURL(url); } catch(e){}
    activeAudios = activeAudios.filter(a => a !== el);
    toast('재생 오류 (형식 미지원일 수 있음)');
    if (onEnded) onEnded();
  };
  activeAudios.push(el);
  return el.play().catch(e => { toast('재생 실패: ' + e.message); });
}

// ── 화면 전환 ──────────────────────────────────────────
const $ = id => document.getElementById(id);
const show = id => document.querySelectorAll('.sc').forEach(s => s.classList.toggle('on', s.id === id));

function refreshMain() { $('main-cnt').textContent = String(soundCount).padStart(2, '0'); }

function refreshList() {
  $('list-num').textContent  = soundCount ? '#' + String(selectedIdx).padStart(2, '0') : '#--';
  $('list-info').textContent = soundCount ? `${selectedIdx} / ${soundCount}` : '– / –';
  $('list-lbl').textContent  = listPlaying ? 'playing...' : '';
  $('play-btn').textContent  = listPlaying ? 'STOP' : 'PLAY';
  $('play-btn').classList.toggle('on', listPlaying);
}

function refreshVol() {
  const h = $('vol-track').getBoundingClientRect().height;
  if (!h) return;
  const fh = (volume / 30) * h;
  $('vol-fill').style.height  = fh + 'px';
  $('vol-thumb').style.bottom = fh + 'px';
  $('vol-num').textContent    = volume;
}

// ── 네비게이션 ─────────────────────────────────────────
function goMain() { stopAudio(); listPlaying = false; refreshMain(); show('s-main'); }

function goList() {
  if (soundCount > 0 && selectedIdx > soundCount) selectedIdx = soundCount;
  if (soundCount > 0 && selectedIdx < 1)          selectedIdx = 1;
  refreshList(); show('s-list'); setTimeout(refreshVol, 30);
}

function doPlayOne() {
  stopAudio();
  const item = sounds[selectedIdx - 1];
  if (!item) { listPlaying = false; refreshList(); return; }
  playBlobEl(item.blob, () => { if (listPlaying) { listPlaying = false; refreshList(); } });
}

function togglePlay() {
  if (!soundCount) return;
  listPlaying = !listPlaying;
  refreshList();
  if (listPlaying) doPlayOne(); else stopAudio();
}

function goPrev() {
  if (!soundCount) return;
  if (selectedIdx > 1) selectedIdx--;
  if (listPlaying) doPlayOne();
  refreshList();
}

function goNext() {
  if (!soundCount) return;
  if (selectedIdx < soundCount) selectedIdx++;
  if (listPlaying) doPlayOne();
  refreshList();
}

// ── 녹음 비주얼라이저 ──────────────────────────────────
function startVisualizer(stream) {
  const canvas = $('vis');
  if (!canvas) return;
  try {
    visAC = new (window.AudioContext || window.webkitAudioContext)();
    const src = visAC.createMediaStreamSource(stream);
    const an  = visAC.createAnalyser();
    an.fftSize = 128;
    src.connect(an);
    const data = new Uint8Array(an.frequencyBinCount);
    const ctx  = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    (function draw() {
      visRaf = requestAnimationFrame(draw);
      an.getByteFrequencyData(data);
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const bw = W / data.length;
      for (let i = 0; i < data.length; i++) {
        const h = (data[i] / 255) * H;
        ctx.fillStyle = `rgb(${Math.floor(data[i]*0.8+55)},20,20)`;
        ctx.fillRect(i * bw, H - h, bw - 1, h);
      }
    })();
  } catch(e) { console.warn('vis error', e); }
}

function stopVisualizer() {
  cancelAnimationFrame(visRaf); visRaf = null;
  if (visAC) { visAC.close().catch(()=>{}); visAC = null; }
  const c = $('vis'); if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

// ── 녹음 ───────────────────────────────────────────────
async function startRec() {
  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); }
  catch(e) { alert('마이크 오류: ' + (e.message || e)); return; }

  startVisualizer(stream);

  const mimes = ['audio/mp4', 'audio/aac', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg'];
  const mime  = mimes.find(m => { try { return MediaRecorder.isTypeSupported(m); } catch(_){ return false; } });
  try       { mediaRec = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined); }
  catch(_)  { mediaRec = new MediaRecorder(stream); }

  recChunks = [];
  mediaRec.ondataavailable = e => { if (e.data && e.data.size > 0) recChunks.push(e.data); };
  mediaRec.onstop = async () => {
    stopVisualizer();
    stream.getTracks().forEach(t => t.stop());
    if (recChunks.length > 0) {
      const blob = new Blob(recChunks, { type: mediaRec.mimeType || 'audio/mp4' });
      toast(`저장 중... (${(blob.size/1024).toFixed(0)}KB)`);
      try { await dbSave(blob); await reloadSounds(); }
      catch(e) { toast('저장 오류: ' + e.message); }
    } else { toast('녹음 데이터 없음'); }
    goMain();
  };

  mediaRec.start(200);
  const t0 = Date.now();
  show('s-rec');

  (function tick() {
    const elapsed = (Date.now() - t0) / 1000;
    const left    = Math.max(0, 10 - elapsed);
    $('rec-time').textContent = left.toFixed(1);
    $('rec-fill').style.width = Math.min(elapsed / 10 * 100, 100) + '%';
    if (left <= 0) { stopRec(); return; }
    recRaf = requestAnimationFrame(tick);
  })();
}

function stopRec() {
  cancelAnimationFrame(recRaf);
  if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
}

// ── 전체 재생 (반복) ────────────────────────────────────
function playAllOnce() {
  if (!playAllLooping || !soundCount) return;
  let remaining = sounds.length;
  const done = () => { if (--remaining <= 0 && playAllLooping) setTimeout(playAllOnce, 400); };
  sounds.forEach(item => playBlobEl(item.blob, done));
}
function startAll() {
  if (!soundCount) return;
  show('s-all');
  stopAudio();
  playAllLooping = true;
  playAllOnce();
}

// ── 볼륨 ───────────────────────────────────────────────
function setVolFromY(y) {
  const rect = $('vol-track').getBoundingClientRect();
  volume = Math.round((1 - Math.max(0, Math.min(1, (y - rect.top) / rect.height))) * 30);
  activeAudios.forEach(a => { try { a.volume = volume / 30; } catch(e){} });
  refreshVol();
}

// ── 시계 ───────────────────────────────────────────────
function updateClock() {
  const d = new Date();
  $('clock').textContent = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

// ── 이벤트 등록 ────────────────────────────────────────
function setupEvents() {
  $('main-tap').addEventListener('click', goList);
  $('rec-btn').addEventListener('click',  e => { e.stopPropagation(); startRec(); });
  $('all-btn').addEventListener('click',  e => { e.stopPropagation(); startAll(); });
  $('stop-rec').addEventListener('click', stopRec);
  $('stop-all').addEventListener('click', () => { playAllLooping = false; stopAudio(); goMain(); });
  $('list-back').addEventListener('click', goMain);
  $('prev-btn').addEventListener('click', goPrev);
  $('play-btn').addEventListener('click', togglePlay);
  $('next-btn').addEventListener('click', goNext);
  $('del-btn').addEventListener('click',  deleteSelected);

  const strip = $('vol-strip');
  let drag = false;
  strip.addEventListener('touchstart', e => { e.preventDefault(); strip.classList.add('active');  setVolFromY(e.touches[0].clientY); }, { passive: false });
  strip.addEventListener('touchmove',  e => { e.preventDefault(); setVolFromY(e.touches[0].clientY); }, { passive: false });
  strip.addEventListener('touchend',   () => strip.classList.remove('active'));
  strip.addEventListener('mousedown',  e => { drag = true; strip.classList.add('active'); setVolFromY(e.clientY); });
  document.addEventListener('mousemove', e => { if (drag) setVolFromY(e.clientY); });
  document.addEventListener('mouseup',   () => { if (drag) { drag = false; strip.classList.remove('active'); } });
}

// ── 초기화 ─────────────────────────────────────────────
(async () => {
  try { db = await initDB(); await reloadSounds(); } catch(e) { toast('DB 오류: ' + e); }
  refreshMain(); updateClock(); setInterval(updateClock, 30000); setupEvents();
})();
</script>
</body>
</html>
